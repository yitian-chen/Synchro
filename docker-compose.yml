version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: synchro-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: synchro
      MYSQL_USER: synchro
      MYSQL_PASSWORD: synchro_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:7.2.0
    container_name: synchro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001"  # Redis Insight UI
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
