spring:
  application:
    name: synchro
  jackson:
    coercion:
      empty-string-as-null: true

  datasource:
    url: jdbc:mysql://localhost:3307/synchro?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: synchro
    password: synchro_password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: filesystem:../db/migration

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
  access-token-expiration: 900000      # 15 minutes
  refresh-token-expiration: 604800000    # 7 days

# MinIO Configuration
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: synchro-avatars

# AI Configuration
ai:
  openai:
    api-key: ${OPENAI_API_KEY}
    model: gpt-4o
    embedding-model: text-embedding-3-small

# Matching Algorithm Weights (configurable per CLAUDE.md)
matching:
  trait-similarity-weight: 0.3
  semantic-similarity-weight: 0.25
  preference-match-weight: 0.25
  complementarity-weight: 0.2

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      ai:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  retry:
    instances:
      ai:
        max-attempts: 3
        wait-duration: 2s

# Logging
logging:
  level:
    root: INFO
    io.github.yitianchen.synchro: DEBUG
    dev.langchain4j: DEBUG
